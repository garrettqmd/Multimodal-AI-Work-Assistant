        code: "def main(speech: str, doc: str, ocr: str, query: str) -> dict:\n  \
          \  source_type = \"unknown\"\n    final_text = \"\"\n    \n    # 如果传来的是列表，就用换行符把它缝合起来；如果传来的是字符串，就保持原样\n\
          \    def safe_parse(data):\n        if isinstance(data, list):\n       \
          \     return \"\\n\".join([str(item) for item in data])\n        elif data:\n\
          \            return str(data)\n        return \"\"\n\n    # 使用 if-elif 确保严格的优先级\n\
