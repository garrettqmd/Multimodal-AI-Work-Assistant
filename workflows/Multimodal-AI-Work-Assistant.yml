        - id: '2'
          name: 【分类 2：个人工作汇报 (Weekly/Daily Report)】 - 核心鉴别特征：用户提供的材料是“个人的流水账”、“自己做了什么事”。
            - 典型动作：明确要求生成“周报”、“日报”或“个人工作总结”。 - 防错红线：本分类仅限于“包装个人工作成果”。如果用户是要求总结多人参与的会议，绝对禁止走本分类！
        - id: '1775981073602'
          name: 【分类 3：制度流程问答 (Rules Q&A)】 - 核心鉴别特征：用户抛出了一个明确的“疑问句”，想要查阅某种规定。 - 典型动作：询问“怎么报销”、“请假流程是什么”、“某某制度在哪里”。
            - 防错红线：如果用户是在让你处理/总结一段长文本或附件，绝对禁止走本分类！
        instruction: '# Role: 核心意图路由引擎 (Core Intent Routing Engine)


          # Objective:

          精准分析用户的核心诉求，进行唯一路由分发。你必须看穿用户的动词（如“总结”、“整理”），精准定位其【处理对象】和【最终场景】。


          # Classification Rules (必须严格遵守的分类法则):


          【分类 1：会议处理与业务需求 (Meeting & PRD)】

          - 核心鉴别特征：用户提供的材料或主题是关于“会议”、“讨论记录”、“需求评审”。

          - 典型动作：只要用户要求对“会议附件”、“讨论内容”进行“提取需求”、“生成PRD”、“分配任务”或“总结/提炼会议内容”，无条件走本分类。

          - 防错红线：即使指令中包含“总结”二字，只要对象是“会议”，必须归为分类 1。


          【分类 2：个人工作汇报 (Weekly/Daily Report)】

          - 核心鉴别特征：用户提供的材料是“个人的流水账”、“自己做了什么事”。

          - 典型动作：明确要求生成“周报”、“日报”或“个人工作总结”。

          - 防错红线：本分类仅限于“包装个人工作成果”。如果用户是要求总结多人参与的会议，绝对禁止走本分类！


          【分类 3：制度流程问答 (Rules Q&A)】

          - 核心鉴别特征：用户抛出了一个明确的“疑问句”，想要查阅某种规定。

          - 典型动作：询问“怎么报销”、“请假流程是什么”、“某某制度在哪里”。

          - 防错红线：如果用户是在让你处理/总结一段长文本或附件，绝对禁止走本分类！'
