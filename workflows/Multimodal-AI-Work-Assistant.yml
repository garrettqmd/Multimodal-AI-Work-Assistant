          \  final_text = safe_parse(speech)\n    elif doc:\n        source_type =\
          \ \"document_extraction\" \n        final_text = safe_parse(doc)\n    elif\
          \ ocr:\n        source_type = \"image_ocr\"           \n        final_text\
